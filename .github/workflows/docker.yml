name: docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/trivis-ai/trf-ui2
          tags: |
            type=raw,value=prod
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Rollout staging (trf.is) via webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          PAYLOAD='{"app":"trf-ui2","env":"prod","ref":"'"${GITHUB_REF_NAME}"'","sha":"'"${GITHUB_SHA}"'"}'
          SIG=$(printf "%s" "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | xxd -p -c 256)
          # This secret (WEBHOOK_URL) is a BASE url — unlike trivis-build.yaml's
          # TRIVIS_WH_URL (which is a full deploy path and works bare). So keep
          # the /deploy/{namespace}/{name} route the server expects; posting bare
          # 404s (no root route). The one thing the old version lacked was a
          # failure check: no -f meant a bad rollout still exited 0. Add the
          # loud-fail so a non-2xx can't hide behind a green check.
          URL="${WEBHOOK_URL%/}/deploy/trf-ui2/trf-ui2"
          RESP=$(curl -sS -k -w $'\n%{http_code}' -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD")
          CODE="${RESP##*$'\n'}"
          BODY="${RESP%$'\n'*}"
          echo "rollout response: HTTP ${CODE} — ${BODY}"
          case "$CODE" in
            2*) echo "rollout accepted" ;;
            *) echo "::error::rollout webhook failed (HTTP ${CODE})"; exit 1 ;;
          esac
